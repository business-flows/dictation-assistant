name: Build & Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - windows
          - android

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  # =========================================================================
  # pre-check — fail fast on analysis, formatting, and tests
  # =========================================================================
  pre-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  # =========================================================================
  # Build — macOS
  # =========================================================================
  build-macos:
    needs: [pre-check]
    runs-on: macos-latest
    if: >
      github.event.inputs.platform == 'macos' ||
      github.event.inputs.platform == 'all' ||
      github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS
        run: |
          APP_NAME="Dictation Assistant"
          BUILD_DIR="build/macos/Build/Products/Release"
          OUTPUT_DIR="build_outputs"
          mkdir -p "$OUTPUT_DIR"
          cp -R "$BUILD_DIR/$APP_NAME.app" "$OUTPUT_DIR/"
          cd "$OUTPUT_DIR"
          zip -q -r "dictation-assistant-macos.zip" "$APP_NAME.app"
          echo "=== macOS package ==="
          ls -lh dictation-assistant-macos.zip
          du -sh "$APP_NAME.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: build_outputs/dictation-assistant-macos.zip
          if-no-files-found: error

  # =========================================================================
  # Build — Windows
  # =========================================================================
  build-windows:
    needs: [pre-check]
    runs-on: windows-latest
    if: >
      github.event.inputs.platform == 'windows' ||
      github.event.inputs.platform == 'all' ||
      github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        run: |
          $OutputDir = "build_outputs"
          New-Item -ItemType Directory -Force -Path $OutputDir
          $SourceDir = "build/windows/x64/runner/Release"
          Copy-Item -Path "$SourceDir\*" -Destination $OutputDir -Recurse -Force
          Compress-Archive -Path "$OutputDir\*" -DestinationPath "build_outputs/dictation-assistant-windows.zip" -Force
          Write-Host "=== Windows package ==="
          Get-ChildItem build_outputs/dictation-assistant-windows.zip | Select-Object Name, Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: build_outputs/dictation-assistant-windows.zip
          if-no-files-found: error

  # =========================================================================
  # Build — Android
  # =========================================================================
  build-android:
    needs: [pre-check]
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'all' ||
      github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Rename & verify
        run: |
          mkdir -p build_outputs
          cp build/app/outputs/flutter-apk/app-release.apk build_outputs/dictation-assistant-android.apk
          cp build/app/outputs/bundle/release/app-release.aab build_outputs/dictation-assistant-android.aab
          echo "=== Android packages ==="
          ls -lh build_outputs/

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-artifact
          path: build_outputs/dictation-assistant-android.apk
          if-no-files-found: error

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-artifact
          path: build_outputs/dictation-assistant-android.aab
          if-no-files-found: error

  # =========================================================================
  # Release — create GitHub release on version tag
  # =========================================================================
  release:
    needs: [build-macos, build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-artifact
          path: release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: release/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-artifact
          path: release/

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab-artifact
          path: release/

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.apk
            release/*.aab
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
