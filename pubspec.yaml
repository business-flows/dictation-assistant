name: dictation_assistant
description: "Cross-platform offline dictation assistant with whisper.cpp"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Local Database (Drift)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  drift_flutter: ^0.2.0

  # Audio Recording (cross-platform)
  record: ^5.1.2
  record_platform_interface: ^1.2.0

  # Whisper.cpp FFI bindings
  whisper_ggml_plus: ^1.5.2

  # HTTP Client + Streaming
  dio: ^5.7.0
  retrofit: ^4.4.0

  # DOCX Generation
  docx_creator: ^1.2.3

  # File System & Path
  path_provider: ^2.1.4
  path: ^1.9.0

  # File Picker
  file_picker: ^8.1.2

  # Clipboard
  clipboard: ^0.1.3
  super_clipboard: ^0.8.24

  # Functional Programming
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utility
  equatable: ^2.0.5
  ulid: ^2.0.1
  intl: ^0.19.0
  logger: ^2.4.0
  permission_handler: ^11.3.1
  share_plus: ^10.0.2
  open_filex: ^4.5.0
  audioplayers: ^6.1.0

  # Localization
  flutter_localizations:
    sdk: flutter

  # Responsive UI
  flutter_adaptive_scaffold: ^0.2.6

  # Collection utilities
  collection: ^1.18.0

  # Window management (desktop)
  window_manager: ^0.4.2

  # Secure storage
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  drift_dev: ^2.20.0
  freezed: ^3.2.4
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.2
  mockito: ^5.4.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/models/
    - assets/config/